version: 2
updates:
  # Python dependencies (runtime is just Flask; dev tools pinned loosely).
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels: ["dependencies"]
    commit-message:
      prefix: "deps"

  # Keep CI actions current (security patches for pinned action versions).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels: ["ci", "dependencies"]
    commit-message:
      prefix: "ci"
