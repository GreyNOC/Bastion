name: Release

# Publishes wheels + sdist + portable bundles when a version tag is pushed.
# `workflow_dispatch` builds and verifies the same artifacts without publishing
# (a dry run of the pipeline).
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # QA gate — a tag must not publish anything that would not pass CI.
  verify:
    name: verify (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - run: ruff check src tests
      - run: mypy src
      - run: bandit -r src -c pyproject.toml
      - run: pytest

  # sdist + wheel (universal, pip-installable) — the primary distribution.
  wheels:
    name: build wheels + sdist
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: pip install ".[packaging]"
      - name: Build sdist + wheel
        run: python -m build
      - name: Validate metadata
        run: python -m twine check dist/*
      - name: Install the built wheel and smoke-test the CLI
        run: |
          python -m pip install dist/*.whl
          bastion --version
          bastion doctor --json > /dev/null
      - uses: actions/upload-artifact@v4
        with:
          name: dist-wheels
          path: |
            dist/*.whl
            dist/*.tar.gz

  # Self-contained portable bundles — one per OS (a vendored dep may be native).
  portable:
    name: portable (${{ matrix.os }})
    needs: verify
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - name: Build portable bundle (vendors runtime deps + self-smoke-tests)
        run: python scripts/build_portable.py
      - uses: actions/upload-artifact@v4
        with:
          name: portable-${{ matrix.os }}
          path: dist/*.zip

  # Publish a GitHub Release with every artifact. Tag pushes only.
  release:
    name: publish release
    needs: [wheels, portable]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: List artifacts
        run: ls -la artifacts
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "GreyNOC Bastion ${GITHUB_REF_NAME}" \
            --generate-notes \
            artifacts/*
